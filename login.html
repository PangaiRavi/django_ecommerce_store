{% extends 'base.html' %}

{% block content %}

<style>

body{
background:#f5f5f5;
font-family:Arial, sans-serif;
}

.auth-box{
width:400px;
margin:60px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,0.1);
}

.auth-box h2{
text-align:center;
margin-bottom:30px;
color:#333;
}

.auth-box input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

.auth-box input:focus{
border-color:#28a745;
}

.auth-btn{
width:100%;
padding:14px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.auth-btn:hover{
background:#1e7e34;
}

.bottom-text{
text-align:center;
margin-top:20px;
font-size:15px;
}

.bottom-text a{
text-decoration:none;
color:#28a745;
font-weight:bold;
}

.error-message{
color:red;
text-align:center;
margin-bottom:15px;
}

</style>

<div class="auth-box">

<h2>User Login</h2>

{% if error %}
<div class="error-message">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text"
name="username"
placeholder="Enter Username"
required>

<input type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit" class="auth-btn">
Login
</button>

</form>

<div class="bottom-text">
Don't have an account?
<a href="{% url 'signup' %}">
Signup
</a>
</div>

</div>

{% endblock %}
