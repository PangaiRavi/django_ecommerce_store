<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .form-box {
            width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #218838;
        }

        p {
            margin: 5px 0;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="form-box">

        <h2>Checkout</h2>

        <p><b>{{ product.name }}</b></p>
        <p>Price: ₹{{ product.price }}</p>

        <form method="POST">
            {% csrf_token %}

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Phone</label>
            <input type="text" name="phone" required>

            <label>Address</label>
            <textarea name="address" required></textarea>

            <label>City</label>
            <input type="text" name="city" required>

            <label>Pincode</label>
            <input type="text" name="pincode" required>

            <button type="submit">Place Order</button>
        </form>

    </div>
</body>
</html>
