{% extends 'base.html' %}

{% block content %}

<style>

body{
background:#f5f5f5;
font-family:Arial, sans-serif;
}

.auth-box{
width:400px;
margin:60px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,0.1);
}

.auth-box h2{
text-align:center;
margin-bottom:30px;
color:#333;
}

.auth-box input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

.auth-box input:focus{
border-color:#28a745;
}

.auth-btn{
width:100%;
padding:14px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.auth-btn:hover{
background:#1e7e34;
}

.bottom-text{
text-align:center;
margin-top:20px;
font-size:15px;
}

.bottom-text a{
text-decoration:none;
color:#28a745;
font-weight:bold;
}

.errorlist{
color:red;
list-style:none;
padding:0;
}

.helptext{
display:none;
}

</style>

<div class="auth-box">

<h2>Create Account</h2>

<form method="POST" autocomplete="off">
{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="auth-btn">
Signup
</button>

</form>

<div class="bottom-text">
Already have an account?
<a href="{% url 'login' %}">
Login
</a>
</div>

</div>

{% endblock %}
